name: Build Netscape Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 11
        # Downgrading to Java 11 fixes the "ReflectionCache" error
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Find and Fix Gradlew
        run: |
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: No gradlew found."
            exit 1
          fi
          chmod +x "$GRADLEW_PATH"
          echo "GRADLEW_EXEC=$GRADLEW_PATH" >> $GITHUB_ENV

      - name: Build Netscape APK
        run: |
          ${{ env.GRADLEW_EXEC }} assembleDebug -x lint -x test --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: netscape-hub-apk
          path: "**/build/outputs/apk/debug/*.apk"
