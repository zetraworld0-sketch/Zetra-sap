name: Build Netscape Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Build Netscape APK
        # We skip everything that causes hangs/errors
        run: ./gradlew assembleDebug -x lint -x test --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: netscape-hub-apk
          path: app/build/outputs/apk/debug/*.apk
